<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="default" color="#fff" type="ball-climbing-dot">
  <p style="font-size: 20px; color: white">Loading...</p>
</ngx-spinner>

<div class="mycontent" style="min-height: 85%;">
  <div class="middle-box text-center loginscreen animated fadeInDown">
    <div>
      <h3>Welcome to <br>Minimart Admin</h3>
      <!-- <p>Perfectly designed and precisely prepared admin theme with over 50 pages with extra new web app views. -->
      <!--Continually expanded and constantly improved Inspinia Admin Them (IN+)-->
      <!-- </p> -->
      <!-- <p>Login in.</p> -->
      <!-- <form class="m-t" role="form" action="index.html"> -->
      <form class="m-t" (ngSubmit)="onLogin(flogin)" #flogin="ngForm">
        <div class="form-group">
          <input type="email" class="form-control" placeholder="Email" required name="email" ngModel
            pattern="^[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$">
        </div>
        <div class="form-group">
          <input type="password" class="form-control" placeholder="Password" required name="password" ngModel>
        </div>
        <button type="submit" class="btn btn-primary block full-width m-b" [disabled]="!flogin.valid">Login</button>
      </form>
      <p><strong>&copy; 2021 Minimart</strong><br />
        Copyright © Minimart.app 2021. <a href="https://www.minimart.app" style="color: #28a745"
          target="_blank">www.minimart.app</a></p>
    </div>
  </div>
</div>
