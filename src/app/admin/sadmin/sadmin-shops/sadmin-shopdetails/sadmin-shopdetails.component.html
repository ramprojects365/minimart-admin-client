<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="default" color="#fff" type="ball-climbing-dot">
    <p style="font-size: 20px; color: white">Loading...</p>
</ngx-spinner>
<div class="row">
    <div class="col-lg-12">
        <div class="ibox animated fadeInRight">
            <div class="ibox-title">
                <button pButton type="button" icon="pi pi-arrow-left" style="margin-right: 1em;"
                    (click)="router.navigate(['admin/sadmin/shops']);"></button>
                <h5>Services ({{this.branchName}})</h5>
            </div>
            <div class="ibox-content" style="background: #f3f3f4;padding: 40px 20px 0px 20px;">
                <div class="ibox ">
                    <div class="ibox-title">
                        <h5>Delivery</h5>
                        <button (click)="showdisplayDeliveryAdder()" style="margin-top: -0.6em;" pButton type="submit"
                            label="Add Delivery" class="float-right ui-button-raised"></button>
                    </div>
                    <div class="ibox-content" style="padding-bottom: 33px;">
                        <p-table #dt [columns]="cols" [value]="deliveryVendors"
                            [globalFilterFields]="['del_ven_name', 'status']" dataKey="admin_id" editMode="row"
                            [paginator]="true" [rows]="10" [resizableColumns]="true" [responsive]="true">
                            <ng-template pTemplate="caption">
                                <div class="row">
                                    <div class="col-lg-6"></div>
                                    <div class="col-lg-6">
                                        <i class="fa fa-search" style="position:absolute;right:30px;top:15px;"></i>
                                        <input type="text" pInputText size="50" placeholder="Search"
                                            (input)="dt.filterGlobal($event.target.value, 'contains')"
                                            style="width:100%;padding:12px;background:#fff">
                                    </div>
                                </div>
                            </ng-template>
                            <ng-template pTemplate="header">
                                <tr>
                                    <th style="width:4em">#</th>
                                    <th [pSortableColumn]="'del_ven_name'">Name
                                        <p-sortIcon [field]="'del_ven_name'" ariaLabel="Activate to sort"
                                            ariaLabelDesc="Activate to sort in descending order"
                                            ariaLabelAsc="Activate to sort in ascending order"></p-sortIcon>
                                    </th>
                                    <th [pSortableColumn]="'status'">Status
                                        <p-sortIcon [field]="'status'" ariaLabel="Activate to sort"
                                            ariaLabelDesc="Activate to sort in descending order"
                                            ariaLabelAsc="Activate to sort in ascending order"></p-sortIcon>
                                    </th>
                                </tr>
                            </ng-template>
                            <ng-template pTemplate="body" let-rowData let-editing="editing" let-ri="rowIndex">
                                <tr [pEditableRow]="rowData">
                                    <td>
                                        {{ri + 1}}
                                    </td>
                                    <td>
                                        {{rowData.del_ven_name}}
                                    </td>
                                    <td>
                                        <span *ngIf="rowData.status== '1'">Active</span>
                                        <span *ngIf="rowData.status== '0'">Inactive</span>
                                    </td>
                                </tr>
                            </ng-template>
                        </p-table>
                    </div>
                </div>
            </div>
            <div class="ibox-content" style="background: #f3f3f4;border: none;">
                <div class="ibox ">
                    <div class="ibox-title">
                        <h5>Payment</h5>
                        <button (click)="showdisplayPaymentAdder()" style="margin-top: -0.6em;" pButton type="submit"
                            label="Add Payment" class="float-right ui-button-raised"></button>
                    </div>
                    <div class="ibox-content" style="padding-bottom: 33px;">
                        <p-table #dt [columns]="cols" [value]="paymentVendors"
                            [globalFilterFields]="['payment_gateway_name', 'status']" dataKey="admin_id" editMode="row"
                            [paginator]="true" [rows]="10" [resizableColumns]="true" [responsive]="true">
                            <ng-template pTemplate="caption">
                                <div class="row">
                                    <div class="col-lg-6"></div>
                                    <div class="col-lg-6">
                                        <i class="fa fa-search" style="position:absolute;right:30px;top:15px;"></i>
                                        <input type="text" pInputText size="50" placeholder="Search"
                                            (input)="dt.filterGlobal($event.target.value, 'contains')"
                                            style="width:100%;padding:12px;background:#fff">
                                    </div>
                                </div>
                            </ng-template>
                            <ng-template pTemplate="header">
                                <tr>
                                    <th style="width:4em">#</th>
                                    <th [pSortableColumn]="'payment_gateway_name'">Name
                                        <p-sortIcon [field]="'payment_gateway_name'" ariaLabel="Activate to sort"
                                            ariaLabelDesc="Activate to sort in descending order"
                                            ariaLabelAsc="Activate to sort in ascending order"></p-sortIcon>
                                    </th>
                                    <th [pSortableColumn]="'status'">Status
                                        <p-sortIcon [field]="'status'" ariaLabel="Activate to sort"
                                            ariaLabelDesc="Activate to sort in descending order"
                                            ariaLabelAsc="Activate to sort in ascending order"></p-sortIcon>
                                    </th>
                                </tr>
                            </ng-template>
                            <ng-template pTemplate="body" let-rowData let-editing="editing" let-ri="rowIndex">
                                <tr [pEditableRow]="rowData">
                                    <td>
                                        {{ri + 1}}
                                    </td>
                                    <td>
                                        {{rowData.payment_gateway_name}}
                                    </td>
                                    <td>
                                        <span *ngIf="rowData.status== '1'">Active</span>
                                        <span *ngIf="rowData.status== '0'">Inactive</span>
                                    </td>
                                </tr>
                            </ng-template>
                        </p-table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<p-dialog appendTo="body" header="Add Delivery" [(visible)]="displayDeliveryAdder" [modal]="true" [responsive]="true"
    [style]="{width: '650px', minWidth: '200px'}" [minY]="70" [closable]="false" [maximizable]="true"
    [baseZIndex]="10000">
    <div class="row">
        <div class="col-lg-12">
            <div class="ibox animated fadeInRight">
                <form role="form" #faddDel="ngForm">
                    <div style="padding: 30px;">
                        <div class="row" *ngFor="let data of deliveryData;" style="margin-bottom:10px">
                            <div class="col-md-3"> <span>{{data.del_ven_name}}</span></div>
                            <div class="col-md-9" style="padding-left: 0px;">
                                <button (click)="addDelivery(true, data)" pButton type="button" label="✓"
                                    class="ui-button-raised"
                                    *ngIf="data.status == 0 || data.status == undefined"></button>
                                <button (click)="addDelivery(false, data)" pButton type="button" label="X"
                                    class="ui-button-raised cancelBtn" *ngIf="data.status == 1"
                                    ></button>
                            </div>
                        </div>
                        <div>
                            <button pButton type="submit" (click)="submitDelivery(faddDel)" label="Ok"
                                class="float-right ui-button-raised"></button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

    </div>
</p-dialog>
<p-dialog appendTo="body" header="Add Payment" [(visible)]="displayPaymentAdder" [modal]="true" [responsive]="true"
    [style]="{width: '650px', minWidth: '200px'}" [minY]="70" [closable]="false" [maximizable]="true"
    [baseZIndex]="10000">
    <div class="row">
        <div class="col-lg-12">
            <div class="ibox animated fadeInRight">
                <form role="form" #faddPay="ngForm">
                    <div style="padding: 30px;">
                        <div class="row" *ngFor="let data of paymentData;" style="margin-bottom:10px">
                            <div class="col-md-3"> <span>{{data.payment_gateway_name}}</span></div>
                            <div class="col-md-9" style="padding-left: 0px;">
                                <button (click)="addPayment(true, data)" pButton type="button" label="✓"
                                    class="ui-button-raised"
                                    *ngIf="data.status == 0 || data.status == undefined"></button>
                                <button (click)="addPayment(false, data)" pButton type="button" label="X"
                                    class="ui-button-raised cancelBtn" *ngIf="data.status == 1"
                                    ></button>
                            </div>
                        </div>
                        <div>
                            <button pButton type="submit" (click)="submitPayment(faddPay)" label="Ok"
                                class="float-right ui-button-raised"></button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

    </div>
</p-dialog>
